<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles\style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Travel Journal</title>
</head>
<body>

<div class="jumbotron text-center color-blue">
  <h1>Travel Journal</h1>
</div>
    
<div id = "posts-container" class ="container"> 
    <!-- Posts will be displayed here -->
</div>
<p class="no-posts">No posts yet!</p>

<div class="container text-center bottom-buttons">
    <div class="row">


        

        <!-- Camera Button -->
         <div class="col">
            <label class="btn btn-primary rounded-circle mb-0 d-inline-flex align-items-center justify-content-center" style="width:60px; height:60px; cursor:pointer;">
            <i class="fa fa-plus"></i>

            <!--Open the camera-->
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="console.log('Zdjęcie zrobione!')">
            </label>
        </div>


        <!-- Map Button -->
         <div class="col">
            <a href="map.html" class="btn btn-primary rounded-circle">Map</a>
        </div>


    </div>
</div>

<!--! Bootstrap JS !-->
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
<script src="scripts\main-script.js"></script>
<script src="scripts/share.js"></script>
</body>
</html>
